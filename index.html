<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Store</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
  <h3 class="text-white">My store</h3>
  <span class="text-white">Cart: <span id="cartCount">0</span></span>
</nav>

<!-- HERO -->
<div class="text-center mt-3 text-white">
  <h2>Smart Wearable Gadgets</h2>
  <p>Earphones | Speakers | Smartwatches</p>
</div>

<div class="container mt-4">

  <!-- FILTERS -->
  <div class="row mb-3">

    <div class="col-md-3">
      <select id="category" class="form-select">
        <option value="all">All Products</option>
      </select>
    </div>

    <div class="col-md-4">
      <input type="text" id="search" class="form-control" placeholder="Search gadgets...">
    </div>

    <div class="col-md-3">
      <select id="sort" class="form-select">
        <option value="">Sort Price</option>
        <option value="low">Low → High</option>
        <option value="high">High → Low</option>
      </select>
    </div>

  </div>

  <!-- LOADER -->
  <div id="loader" class="text-center">
    <div class="spinner-border text-info"></div>
  </div>

  <!-- PRODUCTS -->
  <div class="row" id="products"></div>

</div>

<!-- MODAL -->
<div class="modal fade" id="productModal">
  <div class="modal-dialog">
    <div class="modal-content p-3" id="modalContent"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
